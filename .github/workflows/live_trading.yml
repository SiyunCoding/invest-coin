name: Live Trading (Testnet) Daily Tick

# 매일 UTC 00:35 (= KST 09:35). paper_trading.yml 5분 뒤.
# 봉 마감 직후 → cycle_aware 신호 → Binance Testnet 매매 → 결과 commit.
on:
  schedule:
    - cron: '35 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run live trading tick
        env:
          BINANCE_TESTNET_API_KEY: ${{ secrets.BINANCE_TESTNET_API_KEY }}
          BINANCE_TESTNET_API_SECRET: ${{ secrets.BINANCE_TESTNET_API_SECRET }}
        run: python -X utf8 scripts/live_tick.py

      - name: Commit state + dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live_state.json docs/live_dashboard.html || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "live tick $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
