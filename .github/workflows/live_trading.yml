name: Live Trading Daily Tick

# 매일 UTC 00:35 (= KST 09:35). 어제 마감 봉 기준으로 cycle_aware 신호 계산.
# Binance가 GHA 호스팅 러너 IP를 차단해서 self-hosted runner (Oracle Cloud 춘천) 사용.
# Runner: invest-coin-runner @ Oracle Cloud ap-chuncheon-1
# config/live_trading.yaml의 testnet 플래그가 testnet/mainnet 결정.
on:
  schedule:
    - cron: '35 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tick:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3.11 -m pip install --user --upgrade pip
          python3.11 -m pip install --user -r requirements.txt

      - name: Run live trading tick
        env:
          # testnet 키와 mainnet 키 둘 다 전달 — config의 testnet 플래그가 어느 쪽 쓸지 결정
          BINANCE_TESTNET_API_KEY: ${{ secrets.BINANCE_TESTNET_API_KEY }}
          BINANCE_TESTNET_API_SECRET: ${{ secrets.BINANCE_TESTNET_API_SECRET }}
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3.11 -X utf8 scripts/live_tick.py

      - name: Commit state + dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live_state.json docs/live_dashboard.html || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "live tick $(date -u +%Y-%m-%dT%H:%MZ)"
          # main이 앞서 갔을 수 있으니 rebase + push 재시도 (race condition 대응)
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "Push attempt $attempt failed, retrying after 5s..."
            sleep 5
          done
          echo "Push failed after 3 attempts"
          exit 1
