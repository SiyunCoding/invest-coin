name: Live Trading (Testnet) Daily Tick

# 매일 UTC 00:35 (= KST 09:35). paper_trading.yml 5분 뒤.
# Binance가 GHA 호스팅 러너 IP를 차단해서 self-hosted runner (Oracle Cloud 춘천) 사용.
# Runner: invest-coin-runner @ Oracle Cloud ap-chuncheon-1
on:
  schedule:
    - cron: '35 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tick:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3.11 -m pip install --user --upgrade pip
          python3.11 -m pip install --user -r requirements.txt

      - name: Run live trading tick
        env:
          BINANCE_TESTNET_API_KEY: ${{ secrets.BINANCE_TESTNET_API_KEY }}
          BINANCE_TESTNET_API_SECRET: ${{ secrets.BINANCE_TESTNET_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3.11 -X utf8 scripts/live_tick.py

      - name: Commit state + dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live_state.json docs/live_dashboard.html || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "live tick $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
