name: Futures Scalping (Demo) 5min Tick

# 매 5분 cron. GHA cron은 best-effort라 실제 간격이 5~30분 사이 들쭉날쭉.
# 진짜 5분 보장하려면 Oracle Cloud VPS에서 시스템 cron 직접 사용 필요.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tick:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3.11 -m pip install --user --upgrade pip
          python3.11 -m pip install --user -r requirements.txt

      - name: Run futures scalping tick
        env:
          BINANCE_FUTURES_TESTNET_API_KEY: ${{ secrets.BINANCE_FUTURES_TESTNET_API_KEY }}
          BINANCE_FUTURES_TESTNET_API_SECRET: ${{ secrets.BINANCE_FUTURES_TESTNET_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3.11 -X utf8 scripts/futures_scalp.py

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/futures_state.json || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "futures tick $(date -u +%Y-%m-%dT%H:%MZ)"
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "Push attempt $attempt failed, retrying after 5s..."
            sleep 5
          done
          exit 1
