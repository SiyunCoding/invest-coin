# Live trading 설정 — mainnet 활성화
#
# 이 파일이 존재하면 scripts/live_tick.py의 DEFAULT_CONFIG를 override.
# testnet 으로 다시 돌아가려면 testnet: true 로 바꾸면 됨.
#
# 자동 모드 감지:
# - 모드 변경 시 (testnet ↔ mainnet) 옛 state는 자동 백업되고 새 state로 시작
# - 즉 이 파일 한 줄 바꾸면 봇이 다음 tick에 알아서 전환

testnet: false   # ⚠️ 실거래 활성화 — 진짜 돈 사용

# 안전장치 — 첫 실거래는 보수적으로 시작
safety:
  daily_loss_limit_pct: 0.03     # 하루 -3% 도달 시 자동 정지 (디폴트 -5%보다 엄격)
  max_position_weight: 1.0        # cycle_aware 신호 그대로 따라감 (max 100%)
  max_signal_value: 1.0           # 이상 신호 차단
  halt_file: ".halt"              # 비상 정지 파일
